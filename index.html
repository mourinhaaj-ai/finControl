<!doctype html>
<html lang="pt-BR">
  <head>
    <link rel="manifest" href="manifest.json" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FinControl" />

    <title>💰 FinControl</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 15px;
        color: #333;
        overflow-x: hidden;
      }

      .container {
        max-width: 500px;
        margin: 0 auto;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        text-align: center;
      }

      .header h1 {
        color: #2c3e50;
        margin-bottom: 5px;
        font-size: 28px;
      }

      .header p {
        color: #7f8c8d;
        font-size: 14px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 20px;
      }

      .stat-box {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
      }

      .stat-box h3 {
        font-size: 12px;
        margin-bottom: 10px;
        opacity: 0.9;
      }

      .stat-box .value {
        font-size: 24px;
        font-weight: bold;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #2c3e50;
        font-size: 14px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border: 2px solid #ecf0f1;
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.3s;
        -webkit-appearance: none;
        appearance: none;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
      }

      button:active {
        transform: scale(0.98);
      }

      .btn-secondary {
        background: #ecf0f1;
        color: #2c3e50;
        margin-top: 10px;
      }

      .transaction-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #ecf0f1;
        font-size: 14px;
      }

      .transaction-item:last-child {
        border-bottom: none;
      }

      .transaction-info {
        flex: 1;
      }

      .transaction-desc {
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 3px;
      }

      .transaction-date {
        font-size: 12px;
        color: #95a5a6;
      }

      .transaction-value {
        font-weight: bold;
        font-size: 16px;
        margin-right: 10px;
      }

      .income {
        color: #27ae60;
      }

      .expense {
        color: #e74c3c;
      }

      .btn-delete {
        background: #e74c3c;
        padding: 8px 12px;
        font-size: 12px;
        width: auto;
      }

      .section-title {
        font-size: 18px;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 15px;
        border-bottom: 3px solid #667eea;
        padding-bottom: 10px;
      }

      .empty-state {
        text-align: center;
        color: #95a5a6;
        padding: 30px 20px;
        font-size: 14px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        flex: 1;
        padding: 10px;
        background: #ecf0f1;
        color: #2c3e50;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
        font-size: 14px;
      }

      .tab-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .hidden {
        display: none;
      }

      .logout-btn {
        background: #e74c3c;
        margin-top: 20px;
      }

      .goal-item {
        border: 2px solid #ecf0f1;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 10px;
      }

      .goal-name {
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 10px;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #ecf0f1;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        transition: width 0.3s;
      }

      .goal-info {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #95a5a6;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- TELA DE LOGIN -->
      <div id="loginScreen" class="card">
        <div class="header">
          <h1>💰 FinControl</h1>
          <p>Controle suas finanças com facilidade</p>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="loginPassword" placeholder="Sua senha" />
        </div>

        <button onclick="login()">Entrar</button>
        <button class="btn-secondary" onclick="showRegister()">
          Criar Conta
        </button>
      </div>

      <!-- TELA DE CADASTRO -->
      <div id="registerScreen" class="card hidden">
        <div class="header">
          <h1>💰 FinControl</h1>
          <p>Crie sua conta</p>
        </div>

        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="registerName" placeholder="Seu nome" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input
            type="password"
            id="registerPassword"
            placeholder="Sua senha"
          />
        </div>

        <div class="form-group">
          <label>Confirmar Senha</label>
          <input
            type="password"
            id="registerConfirm"
            placeholder="Confirme a senha"
          />
        </div>

        <button onclick="register()">Criar Conta</button>
        <button class="btn-secondary" onclick="showLogin()">
          Voltar ao Login
        </button>
      </div>

      <!-- TELA PRINCIPAL -->
      <div id="mainScreen" class="hidden">
        <div class="header">
          <h1>💰 FinControl</h1>
          <p id="userName">Bem-vindo!</p>
        </div>

        <!-- ESTATÍSTICAS -->
        <div class="stats">
          <div class="stat-box">
            <h3>📈 Receitas</h3>
            <div class="value" id="totalIncome">R$ 0,00</div>
          </div>
          <div class="stat-box">
            <h3>📉 Despesas</h3>
            <div class="value" id="totalExpense">R$ 0,00</div>
          </div>
        </div>

        <div class="stat-box" style="grid-column: 1 / -1; margin-bottom: 20px">
          <h3>💵 Saldo Total</h3>
          <div class="value" id="totalBalance">R$ 0,00</div>
        </div>

        <!-- ABAS -->
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('transactions')">
            📋 Transações
          </button>
          <button class="tab-btn" onclick="switchTab('goals')">🎯 Metas</button>
          <button class="tab-btn" onclick="switchTab('filters')">
            🔍 Filtros
          </button>
        </div>

        <!-- ABA TRANSAÇÕES -->
        <div id="transactions" class="tab-content active">
          <div class="card">
            <div class="section-title">➕ Adicionar Transação</div>

            <div class="form-group">
              <label>Tipo</label>
              <select id="transactionType">
                <option value="">Selecione...</option>
                <option value="income">Receita</option>
                <option value="expense">Despesa</option>
              </select>
            </div>

            <div class="form-group">
              <label>Categoria</label>
              <select id="transactionCategory">
                <option value="">Selecione...</option>
                <option value="salary">Salário</option>
                <option value="food">Alimentação</option>
                <option value="transport">Transporte</option>
                <option value="entertainment">Entretenimento</option>
                <option value="utilities">Contas</option>
                <option value="health">Saúde</option>
                <option value="other">Outro</option>
              </select>
            </div>

            <div class="form-group">
              <label>Descrição</label>
              <input
                type="text"
                id="transactionDesc"
                placeholder="Descrição da transação"
              />
            </div>

            <div class="form-group">
              <label>Valor (R$)</label>
              <input
                type="number"
                id="transactionValue"
                placeholder="0.00"
                step="0.01"
                min="0"
              />
            </div>

            <div class="form-group">
              <label>Data</label>
              <input type="date" id="transactionDate" />
            </div>

            <button onclick="addTransaction()">Adicionar</button>
          </div>

          <div class="card">
            <div class="section-title">📊 Histórico</div>
            <div id="transactionList"></div>
          </div>
        </div>

        <!-- ABA METAS -->
        <div id="goals" class="tab-content">
          <div class="card">
            <div class="section-title">🎯 Criar Meta</div>

            <div class="form-group">
              <label>Nome da Meta</label>
              <input
                type="text"
                id="goalName"
                placeholder="Ex: Viagem, Carro..."
              />
            </div>

            <div class="form-group">
              <label>Valor Alvo (R$)</label>
              <input
                type="number"
                id="goalValue"
                placeholder="0.00"
                step="0.01"
                min="0"
              />
            </div>

            <button onclick="addGoal()">Criar Meta</button>
          </div>

          <div class="card">
            <div class="section-title">📌 Suas Metas</div>
            <div id="goalsList"></div>
          </div>
        </div>

        <!-- ABA FILTROS -->
        <div id="filters" class="tab-content">
          <div class="card">
            <div class="section-title">🔍 Filtrar Transações</div>

            <div class="form-group">
              <label>Tipo</label>
              <select id="filterType">
                <option value="">Todos</option>
                <option value="income">Receita</option>
                <option value="expense">Despesa</option>
              </select>
            </div>

            <div class="form-group">
              <label>Data Inicial</label>
              <input type="date" id="filterStartDate" />
            </div>

            <div class="form-group">
              <label>Data Final</label>
              <input type="date" id="filterEndDate" />
            </div>

            <div class="form-group">
              <label>Categoria</label>
              <select id="filterCategory">
                <option value="">Todas</option>
                <option value="salary">Salário</option>
                <option value="food">Alimentação</option>
                <option value="transport">Transporte</option>
                <option value="entertainment">Entretenimento</option>
                <option value="utilities">Contas</option>
                <option value="health">Saúde</option>
                <option value="other">Outro</option>
              </select>
            </div>

            <button onclick="applyFilters()">Aplicar Filtros</button>
            <button class="btn-secondary" onclick="clearFilters()">
              Limpar Filtros
            </button>
          </div>

          <div class="card">
            <div id="filteredList"></div>
          </div>
        </div>

        <button class="logout-btn" onclick="logout()">🚪 Sair</button>
      </div>
    </div>

    <script>
      let currentUser = null;
      let users = JSON.parse(localStorage.getItem('users')) || [];
      let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
      let goals = JSON.parse(localStorage.getItem('goals')) || [];

      function initDates() {
        const today = new Date().toISOString().split('T')[0];
        const firstDay = new Date(
          new Date().getFullYear(),
          new Date().getMonth(),
          1,
        )
          .toISOString()
          .split('T')[0];

        document.getElementById('transactionDate').value = today;
        document.getElementById('filterStartDate').value = firstDay;
        document.getElementById('filterEndDate').value = today;
      }

      function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
          alert('Preencha email e senha!');
          return;
        }

        const user = users.find(
          (u) => u.email === email && u.password === password,
        );

        if (user) {
          currentUser = user;
          localStorage.setItem('currentUser', JSON.stringify(user));
          showMainScreen();
        } else {
          alert('Email ou senha incorretos!');
        }
      }

      function register() {
        const name = document.getElementById('registerName').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const confirm = document.getElementById('registerConfirm').value;

        if (!name || !email || !password || !confirm) {
          alert('Preencha todos os campos!');
          return;
        }

        if (password !== confirm) {
          alert('As senhas não conferem!');
          return;
        }

        if (users.find((u) => u.email === email)) {
          alert('Este email já está registrado!');
          return;
        }

        const newUser = { id: Date.now(), name, email, password };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));

        alert('Conta criada! Faça login agora.');
        showLogin();
      }

      function addTransaction() {
        const type = document.getElementById('transactionType').value;
        const category = document.getElementById('transactionCategory').value;
        const desc = document.getElementById('transactionDesc').value.trim();
        const value = parseFloat(
          document.getElementById('transactionValue').value,
        );
        const date = document.getElementById('transactionDate').value;

        if (!type || !category || !desc || !value || !date) {
          alert('Preencha todos os campos!');
          return;
        }

        const transaction = {
          id: Date.now(),
          userId: currentUser.id,
          type,
          category,
          desc,
          value,
          date,
        };

        transactions.push(transaction);
        localStorage.setItem('transactions', JSON.stringify(transactions));

        document.getElementById('transactionType').value = '';
        document.getElementById('transactionCategory').value = '';
        document.getElementById('transactionDesc').value = '';
        document.getElementById('transactionValue').value = '';
        document.getElementById('transactionDate').value = new Date()
          .toISOString()
          .split('T')[0];

        updateStats();
        displayTransactions();
      }

      function deleteTransaction(id) {
        if (confirm('Deletar esta transação?')) {
          transactions = transactions.filter((t) => t.id !== id);
          localStorage.setItem('transactions', JSON.stringify(transactions));
          updateStats();
          displayTransactions();
        }
      }

      function displayTransactions() {
        const userTxns = transactions.filter(
          (t) => t.userId === currentUser.id,
        );
        const list = document.getElementById('transactionList');

        if (userTxns.length === 0) {
          list.innerHTML = '<div class="empty-state">Nenhuma transação</div>';
          return;
        }

        list.innerHTML = userTxns
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .map(
            (t) => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${t.desc}</div>
                        <div class="transaction-date">${new Date(t.date).toLocaleDateString('pt-BR')}</div>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="transaction-value ${t.type === 'income' ? 'income' : 'expense'}">
                            ${t.type === 'income' ? '+' : '-'} R$ ${t.value.toFixed(2)}
                        </span>
                        <button class="btn-delete" onclick="deleteTransaction(${t.id})">✕</button>
                    </div>
                </div>
            `,
          )
          .join('');
      }

      function addGoal() {
        const name = document.getElementById('goalName').value.trim();
        const value = parseFloat(document.getElementById('goalValue').value);

        if (!name || !value) {
          alert('Preencha todos os campos!');
          return;
        }

        const goal = {
          id: Date.now(),
          userId: currentUser.id,
          name,
          targetValue: value,
        };

        goals.push(goal);
        localStorage.setItem('goals', JSON.stringify(goals));

        document.getElementById('goalName').value = '';
        document.getElementById('goalValue').value = '';

        displayGoals();
      }

      function deleteGoal(id) {
        if (confirm('Deletar esta meta?')) {
          goals = goals.filter((g) => g.id !== id);
          localStorage.setItem('goals', JSON.stringify(goals));
          displayGoals();
        }
      }

      function displayGoals() {
        const userGoals = goals.filter((g) => g.userId === currentUser.id);
        const list = document.getElementById('goalsList');

        if (userGoals.length === 0) {
          list.innerHTML = '<div class="empty-state">Nenhuma meta criada</div>';
          return;
        }

        list.innerHTML = userGoals
          .map((g) => {
            const userIncome = transactions
              .filter((t) => t.userId === currentUser.id && t.type === 'income')
              .reduce((sum, t) => sum + t.value, 0);

            const percentage = Math.min(
              (userIncome / g.targetValue) * 100,
              100,
            );

            return `
                    <div class="goal-item">
                        <div class="goal-name">${g.name}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%"></div>
                        </div>
                        <div class="goal-info">
                            <span>R$ ${userIncome.toFixed(2)} / R$ ${g.targetValue.toFixed(2)}</span>
                            <span>${Math.round(percentage)}%</span>
                        </div>
                        <button class="btn-delete" onclick="deleteGoal(${g.id})">Deletar Meta</button>
                    </div>
                `;
          })
          .join('');
      }

      function applyFilters() {
        const type = document.getElementById('filterType').value;
        const startDate = document.getElementById('filterStartDate').value;
        const endDate = document.getElementById('filterEndDate').value;
        const category = document.getElementById('filterCategory').value;

        const filtered = transactions.filter((t) => {
          if (t.userId !== currentUser.id) return false;
          if (type && t.type !== type) return false;
          if (startDate && t.date < startDate) return false;
          if (endDate && t.date > endDate) return false;
          if (category && t.category !== category) return false;
          return true;
        });

        const list = document.getElementById('filteredList');

        if (filtered.length === 0) {
          list.innerHTML =
            '<div class="empty-state">Nenhuma transação encontrada</div>';
          return;
        }

        list.innerHTML = filtered
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .map(
            (t) => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-desc">${t.desc}</div>
                        <div class="transaction-date">${new Date(t.date).toLocaleDateString('pt-BR')}</div>
                    </div>
                    <span class="transaction-value ${t.type === 'income' ? 'income' : 'expense'}">
                        ${t.type === 'income' ? '+' : '-'} R$ ${t.value.toFixed(2)}
                    </span>
                </div>
            `,
          )
          .join('');
      }

      function clearFilters() {
        document.getElementById('filterType').value = '';
        document.getElementById('filterCategory').value = '';
        initDates();
        document.getElementById('filteredList').innerHTML = '';
      }

      function updateStats() {
        const userTxns = transactions.filter(
          (t) => t.userId === currentUser.id,
        );
        const income = userTxns
          .filter((t) => t.type === 'income')
          .reduce((sum, t) => sum + t.value, 0);
        const expense = userTxns
          .filter((t) => t.type === 'expense')
          .reduce((sum, t) => sum + t.value, 0);
        const balance = income - expense;

        document.getElementById('totalIncome').textContent =
          `R$ ${income.toFixed(2)}`;
        document.getElementById('totalExpense').textContent =
          `R$ ${expense.toFixed(2)}`;
        document.getElementById('totalBalance').textContent =
          `R$ ${balance.toFixed(2)}`;
      }

      function switchTab(tabName) {
        document
          .querySelectorAll('.tab-content')
          .forEach((tab) => tab.classList.remove('active'));
        document
          .querySelectorAll('.tab-btn')
          .forEach((btn) => btn.classList.remove('active'));

        document.getElementById(tabName).classList.add('active');
        event.target.classList.add('active');
      }

      function showLogin() {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('registerScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
      }

      function showRegister() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('registerScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
      }

      function showMainScreen() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('registerScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');

        document.getElementById('userName').textContent =
          `Bem-vindo, ${currentUser.name}!`;

        initDates();
        updateStats();
        displayTransactions();
        displayGoals();
      }

      function logout() {
        if (confirm('Sair da conta?')) {
          currentUser = null;
          localStorage.removeItem('currentUser');
          document.getElementById('loginEmail').value = '';
          document.getElementById('loginPassword').value = '';
          showLogin();
        }
      }

      function init() {
        const saved = localStorage.getItem('currentUser');
        if (saved) {
          currentUser = JSON.parse(saved);
          showMainScreen();
        } else {
          showLogin();
        }
      }

      init();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .register('sw.js')
          .then(() => console.log('App pronto para instalação!'));
      }
    </script>
  </body>
</html>
